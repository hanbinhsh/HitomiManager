        <rect x="-70" y="-90" width="36" height="180" rx="15" fill="#171A21"/>
        <rect x="26" y="-35" width="36" height="125" rx="15" fill="#171A21"/>
        <rect x="-70" y="-12" width="125" height="35" rx="15" fill="#171A21"/>
